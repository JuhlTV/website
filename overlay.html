<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Sheriff Chat Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-gold: #d4af37;
            --color-gold-dark: #b8860b;
            --color-twitch: #6441a5;
            --color-twitch-bright: #7f51d6;
            --color-twitch-light: #c77dda;
            --color-live: #FF6B6B;
            --color-success: #4ADE80;
            --color-warning: #FBBF24;
            --color-error: #EF4444;
            
            --bg-dark: rgba(0, 10, 20, 0.95);
            --bg-darker: rgba(0, 5, 10, 0.98);
            --bg-glass: rgba(10, 30, 50, 0.4);
            
            --text-primary: #ffffff;
            --text-secondary: #e0e7ff;
            --text-muted: #a0aec0;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(212, 175, 55, 0.25);
            --shadow-glow: 0 0 30px rgba(212, 175, 55, 0.15);
            
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: transparent;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        .overlay-container {
            max-width: 560px;
            height: calc(100vh - 30px);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            contain: layout style paint;
        }

        .chat-box {
            background: linear-gradient(135deg, rgba(5, 25, 40, 0.95) 0%, var(--bg-dark) 100%);
            border: 2px solid var(--color-gold);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 
                var(--shadow-lg),
                inset 0 0 25px rgba(212, 175, 55, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-height: 360px;
            display: flex;
            flex-direction: column;
            will-change: transform;
            contain: layout style paint;
            position: relative;
            overflow: hidden;
        }

        .chat-box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            z-index: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1.5px solid var(--color-gold);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .chat-header h2 {
            font-family: 'Crimson Text', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--color-gold);
            letter-spacing: 1.5px;
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(212, 175, 55, 0.2);
        }

        .live-indicator {
            width: 12px;
            height: 12px;
            background: var(--color-live);
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite, glow 1.2s ease-in-out infinite;
            flex-shrink: 0;
            box-shadow: 0 0 8px var(--color-live);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 8px var(--color-live), 0 0 12px var(--color-live); }
            50% { box-shadow: 0 0 4px var(--color-live), 0 0 8px var(--color-live); }
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 8px 6px 8px 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
            contain: size style layout;
        }

        .chat-message {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-left: 3px solid;
            padding: 13px 15px;
            border-radius: 6px;
            font-size: 16px;
            animation: slideIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            line-height: 1.5;
            will-change: opacity, transform;
            flex-shrink: 0;
            contain: layout style paint;
            transition: background-color var(--transition-fast), border-color var(--transition-fast);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .chat-message:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-16px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 5px;
        }

        .message-username {
            font-weight: 700;
            font-size: 14.5px;
            display: flex;
            align-items: center;
            gap: 7px;
            flex: 1;
            min-width: 0;
            letter-spacing: 0.3px;
        }

        .username-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 4px currentColor, inset 0 0 2px rgba(0, 0, 0, 0.3);
        }

        .message-text {
            color: var(--text-secondary);
            font-size: 15.5px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-weight: 400;
            line-height: 1.55;
            hyphens: auto;
        }

        .chat-message.twitch {
            border-left-color: var(--color-twitch-bright);
            background: linear-gradient(135deg, rgba(100, 65, 165, 0.15) 0%, rgba(100, 65, 165, 0.05) 100%);
        }

        .chat-message.twitch:hover {
            background: linear-gradient(135deg, rgba(100, 65, 165, 0.18) 0%, rgba(100, 65, 165, 0.08) 100%);
        }

        .chat-message.custom {
            border-left-color: var(--color-gold);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.12) 0%, rgba(212, 175, 55, 0.05) 100%);
        }

        .chat-message.custom:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.08) 100%);
        }

        .message-source {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.8px;
            white-space: nowrap;
            flex-shrink: 0;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(160, 174, 192, 0.1);
            transition: all var(--transition-fast);
        }

        .message-source.twitch {
            color: var(--color-twitch-light);
            background: rgba(100, 65, 165, 0.2);
            border: 0.5px solid rgba(127, 81, 214, 0.3);
        }

        .message-source.custom {
            color: var(--color-gold);
            background: rgba(212, 175, 55, 0.15);
            border: 0.5px solid rgba(212, 175, 55, 0.3);
        }

        ::-webkit-scrollbar {
            width: 7px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--color-gold), var(--color-twitch-light));
            border-radius: 4px;
            min-height: 40px;
            transition: background var(--transition-normal);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #f4c542, #d995f5);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* Connection Status */
        .connection-status {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
            box-shadow: 0 0 6px var(--color-success);
            animation: statusPulse 2s ease-in-out infinite;
            z-index: 2;
        }

        .connection-status.disconnected {
            background: var(--color-error);
            box-shadow: 0 0 6px var(--color-error);
            animation: none;
        }

        .connection-status.connecting {
            background: var(--color-warning);
            box-shadow: 0 0 6px var(--color-warning);
            animation: statusBlink 1s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Responsive */
        @media (max-width: 1920px) {
            .chat-box {
                max-height: 340px;
                padding: 15px;
            }
            
            .chat-header h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 1280px) {
            .chat-box {
                max-height: 300px;
                padding: 14px;
            }

            .chat-message {
                font-size: 14.5px;
                padding: 11px 13px;
            }
            
            .chat-header h2 {
                font-size: 20px;
                letter-spacing: 1px;
            }
            
            .message-text {
                font-size: 14.5px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .overlay-container {
                height: calc(100vh - 20px);
            }
            
            .chat-box {
                border-radius: 8px;
                max-height: 280px;
                padding: 12px;
            }

            .chat-header {
                gap: 8px;
                margin-bottom: 10px;
                padding-bottom: 8px;
            }

            .chat-message {
                font-size: 13px;
                padding: 10px 11px;
                gap: 6px;
            }

            .message-username {
                font-size: 13px;
            }

            .message-text {
                font-size: 13px;
                line-height: 1.5;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .chat-message,
            .live-indicator,
            .connection-status {
                animation: none !important;
            }
            
            .messages-list {
                scroll-behavior: auto;
            }
            
            .chat-message,
            .message-source {
                transition: none !important;
            }
        }

        /* Dark mode optimization */
        @media (prefers-color-scheme: dark) {
            body {
                color-scheme: dark;
            }
        }

        /* High contrast mode */
        @media (prefers-contrast: more) {
            .chat-message {
                border-left-width: 4px;
            }
            
            .message-source {
                font-weight: 800;
                border-width: 1px;
            }
        }

        /* Print styles */
        @media print {
            .overlay-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="chat-box">
            <div class="connection-status" id="connectionStatus"></div>
            <div class="chat-header">
                <div class="live-indicator"></div>
                <h2>CHAT</h2>
            </div>
            <div class="messages-list" id="messagesList"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            MAX_VISIBLE_MESSAGES: 8,
            MESSAGE_DEDUP_TIMEOUT: 500,
            MAX_RECONNECT_ATTEMPTS: 10,
            BASE_RECONNECT_DELAY: 1000,
            MAX_RECONNECT_DELAY: 30000,
            MESSAGE_CLEANUP_INTERVAL: 30000,
            MAX_CACHED_MESSAGES: 100,
            BATCH_RENDER_SIZE: 3
        };

        // ==================== STATE ====================
        const state = {
            filterChannel: (new URLSearchParams(window.location.search).get('channel') || '').toLowerCase(),
            isConnected: false,
            isConnecting: false,
            reconnectAttempts: 0,
            messageCache: new Map(),
            messagePool: [],
            renderedMessages: 0,
            ws: null
        };

        // ==================== DOM ELEMENTS ====================
        const elements = {
            container: document.getElementById('messagesList'),
            chatHeader: document.querySelector('.chat-header h2'),
            connectionStatus: document.getElementById('connectionStatus'),
            chatBox: document.querySelector('.chat-box')
        };

        // ==================== INITIALIZATION ====================
        function init() {
            // Update header if channel filter set
            if (state.filterChannel) {
                elements.chatHeader.textContent = `#${state.filterChannel.toUpperCase()}`;
            }

            // Setup visibility change listener for better reconnect
            document.addEventListener('visibilitychange', handleVisibilityChange);

            // Connect WebSocket
            connectWebSocket();

            // Cleanup interval
            setInterval(cleanupMessageCache, CONFIG.MESSAGE_CLEANUP_INTERVAL);

            console.log('✅ Sheriff Chat Overlay initialized');
        }

        // ==================== WEBSOCKET ====================
        function connectWebSocket() {
            if (state.isConnecting) return;

            state.isConnecting = true;
            updateConnectionStatus('connecting');

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';

            try {
                state.ws = new WebSocket(`${protocol}//${window.location.host}`);

                state.ws.onopen = handleWebSocketOpen;
                state.ws.onmessage = handleWebSocketMessage;
                state.ws.onerror = handleWebSocketError;
                state.ws.onclose = handleWebSocketClose;
            } catch (error) {
                console.error('❌ WebSocket failed:', error);
                scheduleReconnect();
            }
        }

        function handleWebSocketOpen() {
            state.isConnected = true;
            state.isConnecting = false;
            state.reconnectAttempts = 0;
            updateConnectionStatus('connected');
            console.log('✅ Connected to Chat Server');
        }

        function handleWebSocketMessage(event) {
            try {
                const data = JSON.parse(event.data);

                if (!data.type) return;

                if (data.type === 'history') {
                    renderHistory(data.messages || []);
                } else if (data.type === 'new_message' && data.message) {
                    handleNewMessage(data.message);
                }
            } catch (error) {
                console.error('❌ Message parse error:', error);
            }
        }

        function handleWebSocketError(error) {
            console.error('❌ WebSocket error:', error);
            state.isConnected = false;
            state.isConnecting = false;
            updateConnectionStatus('disconnected');
        }

        function handleWebSocketClose() {
            state.isConnected = false;
            state.isConnecting = false;
            console.log('⚠️ WebSocket closed - reconnecting...');
            updateConnectionStatus('disconnected');
            scheduleReconnect();
        }

        function scheduleReconnect() {
            if (state.reconnectAttempts >= CONFIG.MAX_RECONNECT_ATTEMPTS) {
                console.error('❌ Max reconnection attempts reached');
                updateConnectionStatus('disconnected');
                return;
            }

            state.reconnectAttempts++;
            const delay = Math.min(
                CONFIG.BASE_RECONNECT_DELAY * Math.pow(1.5, state.reconnectAttempts),
                CONFIG.MAX_RECONNECT_DELAY
            );

            console.log(`🔄 Reconnecting in ${Math.round(delay / 1000)}s (attempt ${state.reconnectAttempts}/${CONFIG.MAX_RECONNECT_ATTEMPTS})`);
            setTimeout(connectWebSocket, delay);
        }

        // ==================== MESSAGE HANDLING ====================
        function shouldDisplayMessage(msg) {
            if (!state.filterChannel) return true;

            if (msg.source === 'twitch' && msg.channel) {
                return msg.channel.toLowerCase() === state.filterChannel;
            }

            return msg.source === 'custom';
        }

        function renderHistory(messages) {
            elements.container.innerHTML = '';
            state.messageCache.clear();
            state.renderedMessages = 0;

            const filteredMessages = messages
                .filter(shouldDisplayMessage)
                .slice(-CONFIG.MAX_VISIBLE_MESSAGES);

            // Batch render for performance
            filteredMessages.forEach((msg, idx) => {
                renderMessage(msg);
                if ((idx + 1) % CONFIG.BATCH_RENDER_SIZE === 0) {
                    requestAnimationFrame(() => {});
                }
            });

            scrollToBottom();
        }

        function handleNewMessage(message) {
            // Deduplication
            const msgKey = `${message.username}|${message.message}|${message.source}`;
            if (state.messageCache.has(msgKey)) {
                return;
            }

            if (!shouldDisplayMessage(message)) {
                return;
            }

            state.messageCache.set(msgKey);
            setTimeout(() => state.messageCache.delete(msgKey), CONFIG.MESSAGE_DEDUP_TIMEOUT);

            renderMessage(message);

            // Trim old messages
            const messages = elements.container.querySelectorAll('.chat-message');
            if (messages.length > CONFIG.MAX_VISIBLE_MESSAGES) {
                messages[0].remove();
            }

            scrollToBottom();
        }

        function renderMessage(msg) {
            const msgEl = createMessageElement(msg);
            elements.container.appendChild(msgEl);
            state.renderedMessages++;
        }

        function createMessageElement(msg) {
            const source = msg.source || 'custom';
            const msgEl = document.createElement('div');
            msgEl.className = `chat-message ${source}`;
            msgEl.style.borderLeftColor = msg.color || '#d4af37';

            const sourceBadge = source === 'twitch'
                ? '<span class="message-source twitch">Twitch</span>'
                : '<span class="message-source custom">Sheriff</span>';

            msgEl.innerHTML = `
                <div class="message-header">
                    <div class="message-username">
                        <span class="username-dot" style="background-color: ${escapeHtml(msg.color || '#fff')}"></span>
                        <span>${escapeHtml(msg.username || 'Anonym')}</span>
                    </div>
                    ${sourceBadge}
                </div>
                <div class="message-text">${escapeHtml(msg.message || '')}</div>
            `;

            return msgEl;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                elements.container.scrollTop = elements.container.scrollHeight;
            });
        }

        // ==================== UTILITIES ====================
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function updateConnectionStatus(status) {
            elements.connectionStatus.className = `connection-status ${status === 'connected' ? '' : status}`;
        }

        function cleanupMessageCache() {
            // Remove stale detection keys
            const now = Date.now();
            for (const [key, timestamp] of state.messageCache.entries()) {
                if (now - timestamp > CONFIG.MESSAGE_DEDUP_TIMEOUT * 2) {
                    state.messageCache.delete(key);
                }
            }
        }

        function handleVisibilityChange() {
            if (!document.hidden && !state.isConnected && !state.isConnecting) {
                console.log('📱 Page visible - attempting reconnect');
                state.reconnectAttempts = Math.max(0, state.reconnectAttempts - 2);
                connectWebSocket();
            }
        }

        // ==================== PERFORMANCE OPTIMIZATIONS ====================
        // Enable GPU acceleration
        if (elements.chatBox) {
            elements.chatBox.style.transform = 'translate3d(0, 0, 0)';
        }

        if (elements.container) {
            elements.container.style.willChange = 'scroll-position';
        }

        // ==================== START ====================
        init();
    </script>
</body>
</html>
