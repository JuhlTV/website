<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheriff Chat - Overlay System</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #003366 0%, #001f3f 100%);
            color: #fff;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid #d4af37;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.3), 0 0 60px rgba(212, 175, 55, 0.1);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 700px;
        }

        .chat-header {
            background: linear-gradient(135deg, #003366 0%, #001a33 100%);
            padding: 20px;
            border-bottom: 2px solid #d4af37;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            font-family: 'Crimson Text', serif;
            color: #d4af37;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .chat-header p {
            font-size: 12px;
            color: #aaa;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #d4af37;
            padding: 12px;
            border-radius: 6px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-username {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .username-color {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .message-text {
            font-size: 14px;
            word-break: break-word;
            color: #ddd;
        }

        .message-time {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .input-area {
            padding: 15px;
            border-top: 2px solid #d4af37;
            background: rgba(0, 20, 40, 0.98);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #d4af37;
            color: #fff;
            font-size: 14px;
            border-radius: 6px;
            font-family: 'Open Sans', sans-serif;
        }

        input[type="text"]::placeholder {
            color: #888;
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .username-input {
            width: 120px;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #d4af37 0%, #b5a642 100%);
            border: none;
            color: #003366;
            font-weight: 700;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Open Sans', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .info-box {
            background: rgba(212, 175, 55, 0.1);
            border-left: 4px solid #d4af37;
            padding: 15px;
            margin: 15px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-box strong {
            color: #d4af37;
        }

        .overlay-link {
            color: #4ECDC4;
            text-decoration: none;
            font-weight: 700;
        }

        .overlay-link:hover {
            text-decoration: underline;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #f4c542;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🚔 SHERIFF CHAT</h1>
            <p>Live Stream Overlay System</p>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="info-box">
            <strong>💡 Für Streamer:</strong><br>
            Öffne <a href="/overlay" class="overlay-link">das Overlay</a> in OBS als Browser Source (1920x400 px, 30 FPS)
        </div>

        <div class="input-area">
            <input type="text" id="usernameInput" class="username-input" placeholder="Dein Name" maxlength="30">
            <input type="text" id="messageInput" placeholder="Schreib eine Nachricht..." maxlength="500">
            <button onclick="sendMessage()">SENDEN</button>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}`);

        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const usernameInput = document.getElementById('usernameInput');

        ws.onopen = () => {
            console.log('WebSocket verbunden');
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);

                if (data.type === 'history') {
                    messagesArea.innerHTML = '';
                    data.messages.forEach(msg => displayMessage(msg));
                } else if (data.type === 'new_message') {
                    displayMessage(data.message);
                }
            } catch (error) {
                console.error('Fehler beim Verarbeiten der Nachricht:', error);
            }
        };

        function displayMessage(msg) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message';
            messageEl.innerHTML = `
                <div class="message-username">
                    <span class="username-color" style="background-color: ${msg.color}"></span>
                    <span>${escapeHtml(msg.username)}</span>
                </div>
                <div class="message-text">${escapeHtml(msg.message)}</div>
                <div class="message-time">${msg.timestamp}</div>
            `;
            messagesArea.appendChild(messageEl);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function sendMessage() {
            const username = usernameInput.value.trim() || 'Anonym';
            const message = messageInput.value.trim();

            if (!message) {
                messageInput.focus();
                return;
            }

            ws.send(JSON.stringify({
                type: 'chat',
                username,
                message
            }));

            messageInput.value = '';
            messageInput.focus();
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
